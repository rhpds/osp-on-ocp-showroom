---
type: showroom

# Set the left column width to 30%
default_width: 30
# Persist the URL state so browser refresh doesn't reset the UI
persist_url_state: true

view_switcher:
  enabled: true
  default_mode: split

tabs:
  # OpenShift Console
  - name: OpenShift Console
    url: '{openshift_console_url}'

  # Ansible Automation Platform Console
  - name: AAP Console
    url: '{aap_console_url}'

  # Bastion Terminal
  - name: Bastion
    path: /wetty
    port: 443

  # Vertical split terminals
  # - name: Bastion
  #   path: /wetty
  #   port: 443
  #   secondary_name: Bastion
  #   secondary_path: /wetty
  #   secondary_port: 443

  # External page
  #- name: Llamastack Docs
  #  url: 'https://llama-stack.readthedocs.io/en/latest/'
